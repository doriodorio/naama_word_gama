<!DOCTYPE html> /* המשחק של נעמה */
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>משחק המילים נעמ"ה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Alberticole';
            src: url('https://raw.githubusercontent.com/doriodorio/naama_word_gama/main/alberticole.ttf') format('truetype');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation; /* מונע זום בטעות במובייל */
        }

        #words-list {
            display: flex; flex-direction: column; align-items: flex-start;
            width: 100%;
        }

        .word-row { 
            display: flex; align-items: center; 
            gap: clamp(4px, 1.5vw, 8px); 
            margin-bottom: 8px; /* צומצם מ-16 */
            max-width: 100%; 
        }
        
        .letters-container { 
            display: flex; 
            gap: clamp(2px, 1vw, 6px); 
            flex-wrap: wrap; 
            justify-content: flex-start;
        }

        .letter-box {
            font-family: 'Alberticole', 'Assistant', sans-serif;
            width: clamp(24px, 7vw, 38px); /* צומצם */
            height: clamp(24px, 7vw, 38px); /* צומצם */
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #cbd5e0; border-radius: 6px; 
            font-size: clamp(1rem, 4.5vw, 1.5rem); /* צומצם */
            font-weight: bold; background-color: white; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); line-height: 1; padding-top: 2px;
            flex-shrink: 0;
        }

        .letter-box.revealed { background-color: #e6fffa; border-color: #38b2ac; transform: rotateY(360deg); }
        .letter-box.solved { background-color: #f0fff4; border-color: #48bb78; color: #2f855a; }
        .letter-box.first-letter { background-color: #fef3c7; border-color: #f59e0b; color: #b45309; box-shadow: 0 2px 4px rgba(245, 158, 11, 0.2); }

        .gematria-badge {
            background-color: #fffbeb; color: #92400e; border: 1px solid #fde68a;
            padding: clamp(1px, 0.5vw, 2px) clamp(4px, 1.5vw, 8px);
            border-radius: 12px; font-size: clamp(0.6rem, 2.5vw, 0.8rem);
            font-weight: bold; animation: fadeIn 0.5s ease;
            white-space: nowrap;
            margin-right: 4px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .confetti {
            position: absolute; width: 10px; height: 10px; background-color: #f00;
            top: -10px; z-index: 100; animation: fall 3s linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

        .progress-bar-inner { transition: width 0.5s ease-in-out; }

        .hint-btn-style {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; min-height: 3rem; padding: 0.25rem; line-height: 1.1; text-align: center; /* צומצם */
        }

        /* אנימציה כשהזמן אוזל */
        @keyframes timerPulse {
            0% { transform: scale(1); color: #dc2626; }
            50% { transform: scale(1.1); color: #ef4444; }
            100% { transform: scale(1); color: #dc2626; }
        }
        .timer-pulse {
            animation: timerPulse 0.6s infinite;
        }

        /* ספינר טעינה */
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%;
            width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-1 sm:p-2 md:p-4 flex items-center justify-center min-h-[100dvh]">

<!-- מסך פתיחה -->
<div id="splash-screen" class="fixed inset-0 z-50 bg-black flex justify-center">

<div id="game-container" class="w-full max-w-md mx-auto bg-white rounded-2xl shadow-2xl p-3 sm:p-4 md:p-5 relative overflow-hidden hidden flex-col justify-between" style="max-height: 98vh;">
    <!-- Progress Bar with Circle -->

    <div class="grid grid-cols-2 gap-2 mb-3 bg-gray-50 p-2 rounded-xl border border-gray-100">

    <!-- Words List -->

    <!-- Controls -->
    <div id="input-controls" class="space-y-2 mt-auto">
        
        <!-- חלונית הברדק -->
        <div id="yoyo-display" class="hidden mb-1 p-2 bg-purple-50 text-purple-700 border border-purple-200 rounded-lg text-center font-bold text-base shadow-inner transition-all"></div>

        <input type="text" id="word-input" dir="rtl"
               class="w-full text-right text-xl p-3 border-2 border-gray-100 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-50 transition-all shadow-sm disabled:opacity-50 disabled:bg-gray-50"
               placeholder="הקלד מילה..."
               autocomplete="off">
        
        <div class="flex flex-col gap-2">
            <button onclick="checkWord()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-lg font-bold py-3 rounded-xl shadow-md transition-all active:scale-95">
                שלח מילה
            </button>
            
            <div class="grid grid-cols-3 gap-1">
                <button id="letter-hint-btn" onclick="getLetterHint()" class="bg-amber-100 hover:bg-amber-200 text-amber-800 font-bold rounded-lg transition-all disabled:opacity-50 text-[10px] sm:text-xs hint-btn-style">
                    <span>נעמה, תעזרי, תני אות</span><span id="letter-hint-count">(3)</span>
                </button>
                <button id="gematria-hint-btn" onclick="getGematriaHint()" class="bg-amber-100 hover:bg-amber-200 text-amber-800 font-bold rounded-lg transition-all disabled:opacity-50 text-[10px] sm:text-xs hint-btn-style">
                    <span>יובי, תן בגימטריה</span><span id="gematria-hint-count">(2)</span>
                </button>
                <button id="yoyo-hint-btn" onclick="getYoyoHint()" class="bg-purple-100 hover:bg-purple-200 text-purple-800 font-bold rounded-lg transition-all disabled:opacity-50 text-[10px] sm:text-xs border border-purple-200 hint-btn-style">
                    <span>יויו, עשה ברדק!</span><span id="yoyo-hint-count">(1)</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Feedback -->
    <div id="feedback" class="mt-2 text-center h-5 font-bold text-base"></div>
</div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full text-center shadow-2xl">
        <div id="modal-icon" class="mb-2 text-6xl">🎮</div>
        <h2 id="modal-title" class="text-2xl font-black mb-2">המשחק נגמר</h2>
        <div id="modal-body" class="text-lg text-gray-600 mb-6 font-medium leading-relaxed"></div>
        <button id="modal-action-btn" onclick="resetGame(true)" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl hover:bg-blue-700 shadow-lg transition-all active:scale-95 text-lg hidden">
            שחק שוב
        </button>
    </div>
</div>

<!-- מודל טבלת שיאים -->
<div id="leaderboard-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[60]">
    <div class="bg-white rounded-[2rem] p-6 max-w-sm w-full text-center shadow-2xl relative">
        <button onclick="closeLeaderboard()" class="absolute top-3 left-4 text-gray-400 hover:text-gray-800 text-3xl font-bold">&times;</button>
        <h2 class="text-2xl font-black mb-4 text-blue-600 tracking-tight">🏆 אלופי נעמ"ה</h2>
        
        <div id="leaderboard-loading" class="loader"></div>
        
        <div id="leaderboard-list" class="space-y-2 mb-6 max-h-[50vh] overflow-y-auto pr-2 hidden">
            <!-- Scores go here -->
        </div>
        
        <button onclick="closeLeaderboard(); if(!document.getElementById('game-container').classList.contains('hidden')){resetGame(true);}" class="w-full bg-gray-100 text-gray-800 font-black py-3 rounded-xl hover:bg-gray-200 transition-all active:scale-95 text-base mt-2">
            סגור טבלה
        </button>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">

    // משתנים גלובליים למשחק

        { name: "חפצים בבית", pools: { 'נ': ["נברשת", "נר", "נפה", "נייר"], 'ע': ["עציץ", "עריסה", "עיתון", "עט"], 'מ': ["מנורה", "מראה", "מגהץ", "מזלג"], 'ה': ["הדום", "הליכון"] }},
        { name: "מקצועות", pools: { 'נ': ["נגר", "נחת", "נפח"], 'ע': ["עורך דין", "עיתונאי", "עגלון"], 'מ': ["מורה", "מהנדס", "מכונאי", "מנהל"], 'ה': ["הנדסאי", "היסטוריון"] }},
        { name: "איברים בגוף", pools: { 'נ': ["נחיר", "נמש", "ניב"], 'ע': ["עצם", "עין", "עקב", "עורק"], 'מ': ["מצח", "מוח", "מעי"], 'ה': ["היפופיזה", "המסטרינג", "המיספרה"] }},
        { name: "מדינות", pools: { 'נ': ["נורווגיה", "נמיביה", "נפאל"], 'ע': ["עיראק", "עומאן"], 'מ': ["מרוקו", "מצרים", "מקסיקו"], 'ה': ["הולנד", "הודו", "הונגריה"] }},
        { name: "עולם הרכב", pools: { 'נ': ["נתיב", "נורה", "ניווט"], 'ע': ["עגלה", "עצירה", "עוקף"], 'מ': ["מכונית", "מנוע", "מצבר"], 'ה': ["הילוכים", "הגה"] }},
        { name: "צמחים ופרחים", pools: { 'נ': ["נרקיס", "נורית", "נענע"], 'ע': ["עץ", "עלה", "ערבה"], 'מ': ["מרגנית", "מרווה", "מור"], 'ה': ["הדס", "הרדוף"] }},
        { name: "ערים בישראל", pools: { 'נ': ["נתניה", "נשר", "נהריה"], 'ע': ["עכו", "עפולה", "ערד"], 'מ': ["מודיעין", "מעלות", "מטולה"], 'ה': ["הרצליה", "הוד השרון"] }},
        { name: "מאכלים", pools: { 'נ': ["נקניקייה", "נזיד", "נאגטס"], 'ע': ["עוף", "עוגה", "עדשים"], 'מ': ["מרק", "מלאווח", "מוסקה"], 'ה': ["המבורגר", "הרינג"] }},
        { name: "כלי נגינה", pools: { 'נ': ["נבל"], 'ע': ["עוגב", "עוד"], 'מ': ["מפוחית", "מצילתיים"], 'ה': ["הרמוניקה"] }},
        { name: "לבוש ואופנה", pools: { 'נ': ["נעליים", "נזם"], 'ע': ["עניבה", "עגיל"], 'מ': ["מעיל", "מכנסיים", "מטפחת"], 'ה': ["הינומה"] }},
        { name: "עולם המחשבים", pools: { 'נ': ["נתב", "נייד"], 'ע': ["עכבר", "עיבוד", "ענן"], 'מ': ["מקלדת", "מסך", "מדפסת"], 'ה': ["הורדה", "התקנה"] }},
        { name: "דמויות מהתנ\"ך", pools: { 'נ': ["נח", "נעמי", "נתן"], 'ע': ["עשו", "עזרא", "עלי"], 'מ': ["משה", "מרדכי", "מרים"], 'ה': ["הבל", "הגר", "הושע"] }},
        { name: "טבע ונוף", pools: { 'נ': ["נחל", "נקיק"], 'ע': ["עמק", "ענן", "ערפל"], 'מ': ["מערה", "מפל", "מישור"], 'ה': ["הר"] }},
        { name: "רהיטים", pools: { 'נ': ["נדנדה"], 'ע': ["עריסה"], 'מ': ["מיטה", "מדף", "מזנון"], 'ה': ["הדום"] }},
        { name: "תכונות אופי", pools: { 'נ': ["נדיבות", "נאמנות", "נחישות"], 'ע': ["עקשנות", "עצלות", "ענווה"], 'מ': ["מופנמות", "מנהיגות", "מסירות"], 'ה': ["התמדה"] }},
        { name: "עולם הספורט", pools: { 'נ': ["נבחרת", "ניצחון"], 'ע': ["ענף", "עבירה"], 'מ': ["מדליה", "מגרש", "מאמן"], 'ה': ["התעמלות", "הגנה", "התקפה"] }},
        { name: "עולם האגדות", pools: { 'נ': ["נסיך", "נסיכה", "ננס"], 'ע': ["ענק"], 'מ': ["מכשפה", "מפלצת"], 'ה': ["הוביט", "הרפתקה", "הוקוס פוקוס"] }},
        { name: "אמנות ויצירה", pools: { 'נ': ["נייר", "נצנצים"], 'ע': ["עט", "עיצוב", "עיפרון"], 'מ': ["מכחול", "מספריים"], 'ה': ["הבלטה", "הדבקה"] }}
    ];

    window.gematriaMap = {'א':1,'ב':2,'ג':3,'ד':4,'ה':5,'ו':6,'ז':7,'ח':8,'ט':9,'י':10,'כ':20,'ך':20,'ל':30,'מ':40,'ם':40,'נ':50,'ן':50,'ס':60,'ע':70,'פ':80,'ף':80,'צ':90,'ץ':90,'ק':100,'ר':200,'ש':300,'ת':400};
    
    window.usedIndices = []; window.currentCategory = null; window.currentWords = []; window.score = 0;
    window.currentTimer = 1000; window.timerInterval = null;
    window.letterHintsRemaining = 3; window.gematriaHintsRemaining = 2; window.yoyoHintsRemaining = 1;
    window.activeYoyoHint = ""; window.activeYoyoWordIdx = -1;
    window.solvedWords = [false, false, false, false]; window.revealedLetters = [[0],[0],[0],[0]]; window.gematriaRevealed = [false, false, false, false];

    // Firebase Setup
    let auth, db, user, unsubscribeScores;
    let cloudHighScores = [];
    
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-naama-game-id';

    async function initFirebase() {
        try {
            const firebaseConfig = {
                apiKey: "AIzaSyCYQjG5EPhTM50WiZhp_RnxixVJyRP1Pgs",
                authDomain: "naamaisthebest-a75bd.firebaseapp.com",
                projectId: "naamaisthebest-a75bd",
                storageBucket: "naamaisthebest-a75bd.firebasestorage.app",
                messagingSenderId: "939544674597",
                appId: "1:939544674597:web:7fa7e1dfc3854a31cc9acc",
                measurementId: "G-53GSNWPCJG"
            };
            
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (authError) {
                // מתגבר על שגיאת התנגשות (custom-token-mismatch) ועובר ישירות להתחברות אנונימית למסד הנתונים שלך
                console.warn("מתחבר אנונימית למסד הנתונים הפרטי...");
                await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user) {
                    setupScoresListener();
                }
            });
        } catch (error) {
            console.error("Firebase init failed:", error);
            document.getElementById('leaderboard-loading').classList.add('hidden');
            document.getElementById('leaderboard-list').classList.remove('hidden');
            document.getElementById('leaderboard-list').innerHTML = '<p class="text-red-500 font-bold">לא ניתן לטעון שיאים כרגע.</p>';
        }
    }

    function setupScoresListener() {
        if (!user) return;
        const scoresRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
        
        unsubscribeScores = onSnapshot(scoresRef, (snapshot) => {
            cloudHighScores = [];
            snapshot.forEach((doc) => {
                cloudHighScores.push({ id: doc.id, ...doc.data() });
            });
            cloudHighScores.sort((a, b) => b.score - a.score);
            renderLeaderboard();
        }, (error) => {
            console.error("Error fetching scores:", error);
        });
    }

    function renderLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        const loader = document.getElementById('leaderboard-loading');
        
        loader.classList.add('hidden');
        list.classList.remove('hidden');
        list.innerHTML = "";
        
        if (cloudHighScores.length === 0) {
            list.innerHTML = '<p class="text-gray-500 font-bold text-center text-sm">עדיין אין שיאים. היה הראשון!</p>';
            return;
        }

        const topScores = cloudHighScores.slice(0, 20);
        
        topScores.forEach((entry, index) => {
            let rankClass = "bg-gray-50 text-gray-700";
            let medal = "";
            if (index === 0) { rankClass = "bg-yellow-100 text-yellow-800 border border-yellow-300 shadow-sm"; medal = "🥇"; }
            else if (index === 1) { rankClass = "bg-gray-100 text-gray-800 border border-gray-300 shadow-sm"; medal = "🥈"; }
            else if (index === 2) { rankClass = "bg-orange-50 text-orange-800 border border-orange-200 shadow-sm"; medal = "🥉"; }

            const safeName = entry.name.replace(/</g, "&lt;").replace(/>/g, "&gt;");

            list.innerHTML += `
                <div class="flex justify-between items-center p-2 rounded-lg ${rankClass} font-bold text-sm mb-1">
                    <div class="flex items-center gap-2">
                        <span class="w-5 text-center text-base">${medal || (index + 1)}</span>
                        <span>${safeName}</span>
                    </div>
                    <span class="text-blue-600">${entry.score}</span>
                </div>
            `;
        });
    }

    window.saveHighScoreToCloud = async function() {
        if (!user || score <= 0) return;
        
        const nameInput = document.getElementById('player-name');
        const playerName = nameInput && nameInput.value.trim() !== "" ? nameInput.value.trim() : "שחקן אלמוני";
        const submitBtn = document.getElementById('submit-score-btn');
        
        submitBtn.disabled = true;
        submitBtn.innerText = "שומר...";
        
        try {
            const scoresRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
            await addDoc(scoresRef, {
                name: playerName,
                score: score,
                userId: user.uid,
                timestamp: serverTimestamp()
            });
            
            document.getElementById('modal').classList.add('hidden');
            window.showLeaderboard();
        } catch (error) {
            console.error("Error saving score:", error);
            submitBtn.disabled = false;
            submitBtn.innerText = "שגיאה. נסה שוב";
        }
    };

    window.calculateGematria = function(w) { return [...w].reduce((s, c) => s + (gematriaMap[c] || 0), 0); };
    window.getRandom = function(p) { return p[Math.floor(Math.random() * p.length)]; };

    window.startGame = function() {
        document.getElementById('splash-screen').classList.add('hidden');
        document.getElementById('game-container').classList.remove('hidden');
        window.initGame();
    };

    window.startTimer = function() {
        if (timerInterval) clearInterval(timerInterval);
        currentTimer = 1000;
        window.updateTimerUI();
        
        timerInterval = setInterval(() => {
            currentTimer--;
            if (currentTimer <= 0) {
                currentTimer = 0;
                clearInterval(timerInterval);
                window.updateTimerUI();
                window.showGameOver(false, false, "נגמר הזמן למילה!");
            } else {
                window.updateTimerUI();
            }
        }, 60); 
    };

    window.decreaseTimer = function(amount) {
        currentTimer -= amount;
        if (currentTimer <= 0) {
            currentTimer = 0;
            window.updateTimerUI();
            clearInterval(timerInterval);
            window.showGameOver(false, false, "המונה הגיע לאפס!");
            return true;
        }
        window.updateTimerUI();
        return false;
    };

    window.updateTimerUI = function() {
        const tEl = document.getElementById('word-timer');
        if (!tEl) return;
        tEl.innerText = currentTimer;
        
        if (currentTimer < 200) {
            tEl.classList.remove('text-purple-600');
            tEl.classList.add('text-red-600', 'timer-pulse');
        } else {
            tEl.classList.add('text-purple-600');
            tEl.classList.remove('text-red-600', 'timer-pulse');
        }
    };

    window.initGame = function() {
        if (usedIndices.length === 8) { window.showGameOver(true); return; }
        let r; do { r = Math.floor(Math.random() * categoryPools.length); } while (usedIndices.includes(r));
        usedIndices.push(r); currentCategory = categoryPools[r];
        currentWords = [getRandom(currentCategory.pools['נ']), getRandom(currentCategory.pools['ע']), getRandom(currentCategory.pools['מ']), getRandom(currentCategory.pools['ה'])];
        
        letterHintsRemaining = 3; 
        gematriaHintsRemaining = 2;
        yoyoHintsRemaining = 1;
        activeYoyoHint = "";
        activeYoyoWordIdx = -1;

        solvedWords = [false,false,false,false]; gematriaRevealed = [false,false,false,false]; revealedLetters = [[0],[0],[0],[0]];
        
        window.startTimer(); 
        
        window.updateUI(); document.getElementById('feedback').innerText = ""; 
        document.getElementById('word-input').value = ""; document.getElementById('word-input').focus();
    };

    window.createConfetti = function() {
        for (let i = 0; i < 50; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 50%)`;
            c.style.animationDuration = (Math.random() * 2 + 1) + 's';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 3000);
        }
    };

    window.updateUI = function() {
        const catNameEl = document.getElementById('category-name');
        
        if (catNameEl.dataset.currentName !== currentCategory.name) {
            catNameEl.dataset.currentName = currentCategory.name;
            let iteration = 0;
            const chars = "אבגדהוזחטיכלמנסעפצקרשת";
            clearInterval(catNameEl.interval);
            
            catNameEl.interval = setInterval(() => {
                catNameEl.innerText = currentCategory.name
                    .split("")
                    .map((letter, index) => {
                        if(index < Math.floor(iteration)) return letter;
                        if(!/[א-ת]/.test(letter)) return letter;
                        return chars[Math.floor(Math.random() * chars.length)];
                    })
                    .join("");
                
                if(iteration >= currentCategory.name.length){
                    clearInterval(catNameEl.interval);
                    catNameEl.innerText = currentCategory.name;
                }
                iteration += 1 / 2.5; 
            }, 30);
        }

        document.getElementById('score').innerText = score;
        
        const currentStage = usedIndices.length;
        const progress = (currentStage / 8) * 100;
        document.getElementById('progress-bar').style.width = progress + '%';
        const circle = document.getElementById('progress-circle');
        circle.style.right = progress + '%';
        circle.innerText = currentStage;
        
        const lb = document.getElementById('letter-hint-btn');
        lb.disabled = letterHintsRemaining <= 0 || solvedWords.every(v => v);
        document.getElementById('letter-hint-count').innerText = `(${letterHintsRemaining})`;
        
        const gb = document.getElementById('gematria-hint-btn');
        gb.disabled = gematriaHintsRemaining <= 0 || solvedWords.every(v => v);
        document.getElementById('gematria-hint-count').innerText = `(${gematriaHintsRemaining})`;

        const yb = document.getElementById('yoyo-hint-btn');
        yb.disabled = yoyoHintsRemaining <= 0 || solvedWords.every(v => v);
        document.getElementById('yoyo-hint-count').innerText = `(${yoyoHintsRemaining})`;

        const yd = document.getElementById('yoyo-display');
        if (activeYoyoHint) {
            yd.classList.remove('hidden');
            yd.innerText = `ברדק: ${activeYoyoHint}`;
        } else {
            yd.classList.add('hidden');
            yd.innerText = "";
        }

        document.getElementById('word-input').disabled = solvedWords.every(v => v);

        const wl = document.getElementById('words-list'); wl.innerHTML = '';
        currentWords.forEach((word, idx) => {
            const row = document.createElement('div'); row.className = `word-row ${solvedWords[idx] ? 'opacity-80' : 'opacity-100'}`;
            const lc = document.createElement('div'); lc.className = "letters-container";
            [...word].forEach((char, cIdx) => {
                const b = document.createElement('div'); b.className = `letter-box ${cIdx === 0 ? 'first-letter' : ''}`;
                if (char === " ") { 
                    b.style.border = "none"; b.style.background = "transparent"; 
                    b.style.width = "clamp(8px, 2vw, 12px)"; b.style.boxShadow = "none";
                }
                else if (solvedWords[idx] || revealedLetters[idx].includes(cIdx)) { b.innerText = char; b.classList.add('revealed'); if (solvedWords[idx]) b.classList.add('solved'); }
                else { b.innerText = ""; }
                lc.appendChild(b);
            });
            row.appendChild(lc);
            if (gematriaRevealed[idx] && !solvedWords[idx]) { const bg = document.createElement('span'); bg.className = "gematria-badge"; bg.innerText = `${calculateGematria(word)}`; row.appendChild(bg); }
            wl.appendChild(row);
        });
    };

    window.checkWord = function() {
        if (solvedWords.every(v => v) || currentTimer <= 0) return;
        const iF = document.getElementById('word-input'); const i = iF.value.trim(); if (!i) return;
        let fIdx = -1; for (let x = 0; x < 4; x++) { if (!solvedWords[x] && i === currentWords[x]) { fIdx = x; break; } }
        const fb = document.getElementById('feedback');
        
        if (fIdx !== -1) {
            const pointsEarned = currentTimer;
            score += pointsEarned;
            
            if (fIdx === activeYoyoWordIdx) {
                activeYoyoHint = "";
                activeYoyoWordIdx = -1;
            }
            
            solvedWords[fIdx] = true;
            const sc = new Set([...currentWords[fIdx]].filter(c => c !== " "));
            currentWords.forEach((w, wI) => { if (!solvedWords[wI]) { [...w].forEach((c, cI) => { if (sc.has(c) && !revealedLetters[wI].includes(cI)) revealedLetters[wI].push(cI); }); } });
            
            fb.innerText = `מצוין! (+${pointsEarned})`;
            fb.className = "mt-2 text-center h-5 font-bold text-base text-green-600";
            iF.value = "";
            
            if (solvedWords.every(v => v)) {
                clearInterval(timerInterval); 
                activeYoyoHint = ""; 
                window.createConfetti();
                setTimeout(() => { fb.innerText = "שלב הושלם! כל הכבוד!"; setTimeout(window.initGame, 1500); }, 500);
            } else {
                window.startTimer(); 
            }
            window.updateUI();
        } else {
            let nm = false; for (let x = 0; x < 4; x++) { if (!solvedWords[x] && i[0] === currentWords[x][0] && i.length === currentWords[x].length) { nm = true; break; } }
            
            const isGameOver = window.decreaseTimer(50);
            
            if (!isGameOver) {
                fb.innerText = nm ? "נסיון יפה אבל חשבתי על משהו אחר (-50 מהמונה)" : `טעות! (-50 מהמונה)`;
                fb.className = `mt-2 text-center h-5 font-bold text-base ${nm ? 'text-amber-600' : 'text-red-600'}`;
                document.getElementById('game-container').classList.add('shake'); setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 500);
                iF.value = "";
                window.updateUI();
            }
        }
    };

    window.getLetterHint = function() {
        if (letterHintsRemaining <= 0 || solvedWords.every(v => v)) return;
        if (window.decreaseTimer(100)) return; 
        
        const uI = solvedWords.map((v, x) => (!v ? x : -1)).filter(x => x !== -1);
        if (uI.length === 0) return;
        const randomWordIdx = uI[Math.floor(Math.random() * uI.length)];
        const targetWord = currentWords[randomWordIdx];
        const unrevealedIdxs = [];
        [...targetWord].forEach((c, i) => { if (c !== " " && !revealedLetters[randomWordIdx].includes(i)) unrevealedIdxs.push(i); });
        if (unrevealedIdxs.length > 0) {
            revealedLetters[randomWordIdx].push(unrevealedIdxs[Math.floor(Math.random() * unrevealedIdxs.length)]);
            letterHintsRemaining--; window.updateUI();
        }
    };

    window.getGematriaHint = function() {
        if (gematriaHintsRemaining <= 0 || solvedWords.every(v => v)) return;
        if (window.decreaseTimer(100)) return;
        
        const uI = solvedWords.map((v, x) => (!v && !gematriaRevealed[x] ? x : -1)).filter(x => x !== -1);
        if (uI.length === 0) return;
        gematriaRevealed[uI[Math.floor(Math.random() * uI.length)]] = true;
        gematriaHintsRemaining--; window.updateUI();
    };

    window.getYoyoHint = function() {
        if (yoyoHintsRemaining <= 0 || solvedWords.every(v => v)) return;
        if (window.decreaseTimer(100)) return;
        
        const uI = solvedWords.map((v, x) => (!v ? x : -1)).filter(x => x !== -1);
        if (uI.length === 0) return;
        
        const randomWordIdx = uI[Math.floor(Math.random() * uI.length)];
        const wordToScramble = currentWords[randomWordIdx].replace(/\s/g, ''); 
        
        let scrambled = wordToScramble;
        while (scrambled === wordToScramble && wordToScramble.length > 1) {
            scrambled = scrambled.split('').sort(() => 0.5 - Math.random()).join('');
        }
        
        activeYoyoHint = scrambled;
        activeYoyoWordIdx = randomWordIdx;
        yoyoHintsRemaining--;
        window.updateUI();
    };

    window.showGameOver = function(won, gU = false, reason = "") {
        clearInterval(timerInterval);
        const m = document.getElementById('modal'); const b = document.getElementById('modal-body'); m.classList.remove('hidden');
        const naamaHtml = '<span class="text-red-600 text-3xl font-black block mb-2 mt-1">אין כמו נעמה!</span>';
        
        if (won) { 
            document.getElementById('modal-icon').innerText = "🏆";
            document.getElementById('modal-title').innerText = "ניצחון מוחלט!";
        }
        else if (gU) { 
            document.getElementById('modal-icon').innerText = "❤️"; 
            document.getElementById('modal-title').innerText = "לא נורא!";
        }
        else { 
            document.getElementById('modal-icon').innerText = "⏱️"; 
            document.getElementById('modal-title').innerText = reason || "המשחק נגמר";
        }

        let htmlContent = `${naamaHtml}ולך יש <span class="text-blue-600 font-black">${score}</span> נקודות<br>`;
        
        const actionBtn = document.getElementById('modal-action-btn');
        actionBtn.classList.remove('hidden'); 
        
        if (score > 0) {
            htmlContent += `
                <div class="mt-4 bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <p class="text-xs text-gray-500 font-bold mb-2">הכנס שם לשמירת השיא בענן:</p>
                    <input type="text" id="player-name" placeholder="השם שלך..." class="w-full text-center p-2 border-2 border-gray-200 rounded-lg mb-2 font-bold focus:border-blue-500 focus:outline-none" maxlength="15">
                    <button id="submit-score-btn" onclick="saveHighScoreToCloud()" class="w-full bg-green-500 text-white font-black py-2 rounded-lg hover:bg-green-600 shadow-sm transition-all active:scale-95 text-sm">שמור שיא!</button>
                </div>
            `;
            actionBtn.innerText = "דלג ושחק שוב";
            actionBtn.className = "w-full bg-gray-300 text-gray-700 font-black py-3 rounded-xl hover:bg-gray-400 transition-all active:scale-95 text-base mt-2";
        } else {
            actionBtn.innerText = "שחק שוב";
            actionBtn.className = "w-full bg-blue-600 text-white font-black py-3 rounded-xl hover:bg-blue-700 shadow-md transition-all active:scale-95 text-base";
        }
        
        b.innerHTML = htmlContent;
    };

    window.showLeaderboard = function() {
        document.getElementById('leaderboard-modal').classList.remove('hidden');
    };

    window.closeLeaderboard = function() {
        document.getElementById('leaderboard-modal').classList.add('hidden');
    };

    window.resetGame = function(f) { 
        if (f) { score = 0; usedIndices = []; } 
        document.getElementById('modal').classList.add('hidden'); 
        window.initGame(); 
    };

    document.getElementById('word-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') window.checkWord(); });
    
    // אתחול Firebase בטעינת העמוד
    initFirebase();
</script>
</body>
</html>
